version: "3.8"

name: feyn

services:
  postgres:
    image: postgres:16
    container_name: feyn-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-feyn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feynpass}
      POSTGRES_DB: ${POSTGRES_DB:-feyn_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - feyn-network

  # future services (just placeholders for mindset)
  # redis:
  #   image: redis:7
  #   container_name: feyn-redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - feyn-network

  # queue:
  #   image: rabbitmq:3-management
  #   container_name: feyn-rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   networks:
  #     - feyn-network
  
volumes:
  postgres_data:

networks:
  feyn-network:
    driver: bridge